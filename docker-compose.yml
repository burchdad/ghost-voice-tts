version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ghost-voice-postgres
    environment:
      POSTGRES_USER: tts_user
      POSTGRES_PASSWORD: tts_password
      POSTGRES_DB: ghost_voice_tts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: ghost-voice-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ghost-voice-api
    environment:
      DATABASE_URL: postgresql://tts_user:tts_password@postgres:5432/ghost_voice_tts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/2
      TTS_DEVICE: cuda
      TTS_MODEL: tortoise
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./models:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Celery Worker - Synthesis
  celery-worker-synthesis:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ghost-voice-celery-synthesis
    environment:
      DATABASE_URL: postgresql://tts_user:tts_password@postgres:5432/ghost_voice_tts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/2
      TTS_DEVICE: cuda
      TTS_MODEL: tortoise
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./models:/app/models
    command: celery -A app.core.celery worker -Q synthesis -l info -c 2 --time-limit=1800
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Celery Worker - Voice Cloning
  celery-worker-voice-cloning:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ghost-voice-celery-voice-cloning
    environment:
      DATABASE_URL: postgresql://tts_user:tts_password@postgres:5432/ghost_voice_tts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/2
      TTS_DEVICE: cuda
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./models:/app/models
    command: celery -A app.core.celery worker -Q voice_cloning -l info -c 2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Celery Flower - Task Monitoring
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ghost-voice-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker-synthesis
    command: celery -A app.core.celery flower --port=5555

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ghost-voice-network
