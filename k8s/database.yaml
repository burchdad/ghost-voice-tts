apiVersion: v1
kind: Namespace
metadata:
  name: ghost-voice-tts

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tts-config
  namespace: ghost-voice-tts
data:
  TTS_MODEL: "tortoise"
  TTS_BATCH_SIZE: "4"
  AUDIO_SAMPLE_RATE: "22050"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: tts-secrets
  namespace: ghost-voice-tts
type: Opaque
stringData:
  DATABASE_URL: "postgresql://tts_user:tts_password@postgres:5432/ghost_voice_tts"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND_URL: "redis://redis:6379/2"
  SECRET_KEY: "your-secret-key-change-in-production"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ghost-voice-tts
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: tts_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tts-secrets
              key: DATABASE_URL
        - name: POSTGRES_DB
          value: ghost_voice_tts
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ghost-voice-tts
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - --appendonly
          - "yes"
          - --maxmemory
          - "2gb"
          - --maxmemory-policy
          - "allkeys-lru"
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ghost-voice-tts
spec:
  ports:
  - port: 5432
  clusterIP: None
  selector:
    app: postgres

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ghost-voice-tts
spec:
  ports:
  - port: 6379
  clusterIP: None
  selector:
    app: redis
